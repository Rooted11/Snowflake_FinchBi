<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FinchBi Analytics</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0f1117; --surface: #1a1d27; --border: #2a2d3d;
    --text: #e8eaf0; --muted: #8b8fa8; --accent: #4f8ef7;
    --green: #34d399; --amber: #fbbf24; --red: #f87171; --purple: #a78bfa;
  }
  body { background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; min-height: 100vh; }
  
  header { background: var(--surface); border-bottom: 1px solid var(--border); padding: 1rem 2rem; display: flex; align-items: center; gap: 12px; }
  .logo { width: 36px; height: 36px; background: var(--accent); border-radius: 8px; display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 16px; }
  header h1 { font-size: 18px; font-weight: 600; }
  .status { margin-left: auto; display: flex; align-items: center; gap: 6px; font-size: 13px; color: var(--muted); }
  .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--green); animation: pulse 2s infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }

  main { padding: 2rem; max-width: 1400px; margin: 0 auto; }

  .kpi-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; margin-bottom: 2rem; }
  .kpi { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 1.25rem; }
  .kpi-label { font-size: 12px; color: var(--muted); text-transform: uppercase; letter-spacing: .06em; margin-bottom: 8px; }
  .kpi-value { font-size: 28px; font-weight: 600; font-variant-numeric: tabular-nums; }
  .kpi-sub { font-size: 12px; color: var(--green); margin-top: 4px; }

  .grid-2 { display: grid; grid-template-columns: 3fr 2fr; gap: 16px; margin-bottom: 16px; }
  .grid-2b { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 16px; }
  .card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 1.25rem; }
  .card-title { font-size: 13px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: .06em; margin-bottom: 1rem; }

  canvas { max-height: 260px; }

  .table-wrap { overflow-x: auto; }
  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  th { text-align: left; padding: 8px 12px; color: var(--muted); font-weight: 500; border-bottom: 1px solid var(--border); font-size: 11px; text-transform: uppercase; }
  td { padding: 10px 12px; border-bottom: 1px solid var(--border); }
  tr:last-child td { border-bottom: none; }
  tr:hover td { background: rgba(79,142,247,.04); }

  .badge { display: inline-block; padding: 2px 8px; border-radius: 20px; font-size: 11px; font-weight: 500; }
  .badge-green { background: rgba(52,211,153,.15); color: var(--green); }
  .badge-amber { background: rgba(251,191,36,.15); color: var(--amber); }
  .badge-red { background: rgba(248,113,113,.15); color: var(--red); }
  .badge-purple { background: rgba(167,139,250,.15); color: var(--purple); }
  .badge-blue { background: rgba(79,142,247,.15); color: var(--accent); }

  .bar-row { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; font-size: 13px; }
  .bar-label { width: 130px; flex-shrink: 0; color: var(--muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .bar-track { flex: 1; height: 8px; background: var(--border); border-radius: 4px; overflow: hidden; }
  .bar-fill { height: 100%; border-radius: 4px; background: var(--accent); transition: width .8s ease; }
  .bar-val { width: 70px; text-align: right; flex-shrink: 0; font-variant-numeric: tabular-nums; }

  .loading { color: var(--muted); font-size: 13px; text-align: center; padding: 2rem; }
  .error { color: var(--red); font-size: 13px; text-align: center; padding: 2rem; }

  @media(max-width: 900px) {
    .kpi-grid { grid-template-columns: repeat(2,1fr); }
    .grid-2, .grid-2b { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<header>
  <div class="logo">F</div>
  <h1>FinchBi Analytics</h1>
  <div class="status"><div class="dot"></div><span id="status-text">Connecting...</span></div>
</header>

<main>
  <!-- KPIs -->
  <div class="kpi-grid">
    <div class="kpi">
      <div class="kpi-label">Total Revenue</div>
      <div class="kpi-value" id="kpi-revenue">—</div>
      <div class="kpi-sub" id="kpi-revenue-sub"></div>
    </div>
    <div class="kpi">
      <div class="kpi-label">Total Orders</div>
      <div class="kpi-value" id="kpi-orders">—</div>
      <div class="kpi-sub" id="kpi-orders-sub"></div>
    </div>
    <div class="kpi">
      <div class="kpi-label">Customers</div>
      <div class="kpi-value" id="kpi-customers">—</div>
      <div class="kpi-sub" id="kpi-customers-sub"></div>
    </div>
    <div class="kpi">
      <div class="kpi-label">Avg Order Value</div>
      <div class="kpi-value" id="kpi-aov">—</div>
      <div class="kpi-sub" id="kpi-aov-sub"></div>
    </div>
  </div>

  <!-- Charts row 1 -->
  <div class="grid-2">
    <div class="card">
      <div class="card-title">Monthly Revenue</div>
      <canvas id="chart-monthly"></canvas>
    </div>
    <div class="card">
      <div class="card-title">Revenue by Region</div>
      <canvas id="chart-regions"></canvas>
    </div>
  </div>

  <!-- Charts row 2 -->
  <div class="grid-2b">
    <div class="card">
      <div class="card-title">Top Products</div>
      <div id="products-bars"><div class="loading">Loading...</div></div>
    </div>
    <div class="card">
      <div class="card-title">Customer Segments</div>
      <div id="segments-table"><div class="loading">Loading...</div></div>
    </div>
  </div>
</main>

<script>
const API = 'https://snowflake-finchbi.onrender.com/api/Analytics';

function fmt(n) { return '$' + Number(n).toLocaleString('en-US', {maximumFractionDigits:0}); }
function fmtK(n) { return n >= 1000 ? '$' + (n/1000).toFixed(1) + 'K' : fmt(n); }

async function fetchAll() {
  try {
    const [summary, monthly, products, segments, regions] = await Promise.all([
      fetch(`${API}/revenue/summary?year=2024`).then(r=>r.json()),
      fetch(`${API}/revenue/monthly?year=2024`).then(r=>r.json()),
      fetch(`${API}/products/top?n=8`).then(r=>r.json()),
      fetch(`${API}/customers/segments`).then(r=>r.json()),
      fetch(`${API}/regions`).then(r=>r.json()),
    ]);

    document.getElementById('status-text').textContent = 'Live · Neon DB';

    // KPIs
    const s = summary.data;
    document.getElementById('kpi-revenue').textContent = fmt(s.totalRevenue);
    document.getElementById('kpi-orders').textContent = s.totalOrders.toLocaleString();
    document.getElementById('kpi-customers').textContent = s.uniqueCustomers.toLocaleString();
    document.getElementById('kpi-aov').textContent = fmt(s.avgOrderValue);
    document.getElementById('kpi-revenue-sub').textContent = '2024 YTD';
    document.getElementById('kpi-orders-sub').textContent = 'Delivered orders';
    document.getElementById('kpi-customers-sub').textContent = 'Active this year';
    document.getElementById('kpi-aov-sub').textContent = 'Per transaction';

    // Monthly chart
    const months = monthly.data.map(m => m.monthName);
    const revenues = monthly.data.map(m => m.revenue);
    new Chart(document.getElementById('chart-monthly'), {
      type: 'bar',
      data: {
        labels: months,
        datasets: [{
          data: revenues,
          backgroundColor: 'rgba(79,142,247,0.7)',
          borderRadius: 4,
          borderSkipped: false,
        }]
      },
      options: {
        responsive: true, maintainAspectRatio: true,
        plugins: { legend: { display: false } },
        scales: {
          x: { grid: { color: '#2a2d3d' }, ticks: { color: '#8b8fa8', font: { size: 11 } } },
          y: { grid: { color: '#2a2d3d' }, ticks: { color: '#8b8fa8', font: { size: 11 }, callback: v => fmtK(v) } }
        }
      }
    });

    // Regions chart
    const regionNames = regions.data.map(r => r.region);
    const regionRevs = regions.data.map(r => r.revenue);
    const colors = ['#4f8ef7','#34d399','#fbbf24','#a78bfa','#f87171'];
    new Chart(document.getElementById('chart-regions'), {
      type: 'doughnut',
      data: {
        labels: regionNames,
        datasets: [{ data: regionRevs, backgroundColor: colors, borderWidth: 0, hoverOffset: 6 }]
      },
      options: {
        responsive: true, maintainAspectRatio: true,
        plugins: {
          legend: { position: 'bottom', labels: { color: '#8b8fa8', font: { size: 11 }, padding: 12, boxWidth: 12 } }
        }
      }
    });

    // Products bars
    const maxRev = Math.max(...products.data.map(p => p.totalRevenue));
    document.getElementById('products-bars').innerHTML = products.data.map(p => `
      <div class="bar-row">
        <div class="bar-label" title="${p.productName}">${p.productName}</div>
        <div class="bar-track"><div class="bar-fill" style="width:${Math.round(p.totalRevenue/maxRev*100)}%"></div></div>
        <div class="bar-val">${fmtK(p.totalRevenue)}</div>
      </div>`).join('');

    // Segments table
    const segColors = {
      'Champions':'badge-green','Loyal Customers':'badge-blue',
      'Potential Loyalists':'badge-purple','New Customers':'badge-amber',
      'At Risk':'badge-amber','Churned':'badge-red'
    };
    document.getElementById('segments-table').innerHTML = `
      <table><thead><tr>
        <th>Segment</th><th>Customers</th><th>Avg LTV</th><th>Recency</th>
      </tr></thead><tbody>
      ${segments.data.map(s => `<tr>
        <td><span class="badge ${segColors[s.segment]||'badge-blue'}">${s.segment}</span></td>
        <td>${s.customerCount}</td>
        <td>${fmt(s.avgLtv)}</td>
        <td>${s.avgRecencyDays}d</td>
      </tr>`).join('')}
      </tbody></table>`;

  } catch(e) {
    document.getElementById('status-text').textContent = 'Connection error';
    console.error(e);
  }
}

fetchAll();
</script>
</body>
</html>
